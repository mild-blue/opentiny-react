name: CI

on:
  pull_request:
    types: [ opened, synchronize, reopened, ready_for_review ]
    branches:
      - main

# Cancel superseded runs for the same PR/branch to save runner time.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, build, test & storybook
    runs-on: ubuntu-latest
    # Skip draft PRs; the job runs once a draft is marked ready for review.
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - name: Install deps
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Build
        run: yarn build

      # bedrock-auto looks for chromedriver on PATH; the GitHub runner ships a
      # matching Chrome + ChromeDriver, with the driver dir exposed via $CHROMEWEBDRIVER.
      - name: Make pre-installed ChromeDriver available on PATH
        run: echo "$CHROMEWEBDRIVER" >> "$GITHUB_PATH"

      # --useSandboxForHeadless passes --no-sandbox, required for headless Chrome in CI.
      - name: Test (headless Chrome)
        run: yarn test --useSandboxForHeadless

      - name: Build Storybook
        run: yarn build-storybook
